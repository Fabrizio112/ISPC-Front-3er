<div class="min-h-screen bg-gray-100">
  <loader *ngIf="isLoading"></loader>
  <nav class="flex items-center justify-between px-6 py-4 bg-white shadow-md">
    <span class="text-xl font-bold text-gray-800">MyApp</span>
    <button (click)="logout()"
      class="px-4 py-2 text-sm font-semibold text-white bg-red-500 rounded-lg hover:bg-red-600 transition cursor-pointer">
      Logout
    </button>
  </nav>

  <div class="max-w-4xl mx-auto p-6 space-y-6">
    <div class="flex items-center gap-4 p-6 bg-white rounded-2xl shadow-md">
      <div class="flex items-center justify-center w-14 h-14 text-lg font-bold text-white bg-blue-500 rounded-full">
        {{ user?.username?.charAt(0) }}{{ user?.username?.charAt(1) }}
      </div>
      <div>
        <h2 class="text-xl font-semibold text-gray-800">
          Bienvenido, {{ user?.username }}
        </h2>
        <p class="text-gray-500">{{ user?.email }}</p>
      </div>
    </div>
    <div class="p-6 bg-white rounded-2xl shadow-md">
      <h3 class="mb-4 text-lg font-semibold text-gray-800">
        Datos del perfil
      </h3>

      <div class="space-y-3">

        <div class="flex justify-between border-b pb-2">
          <span class="text-gray-500">Username</span>
          <span class="font-medium text-gray-800">{{ user?.username }}</span>
        </div>

        <div class="flex justify-between border-b pb-2">
          <span class="text-gray-500">Email</span>
          <span class="font-medium text-gray-800">{{ user?.email }}</span>
        </div>

        <div class="flex justify-between items-center">
          <span class="text-gray-500">Estado</span>
          <span class="px-3 py-1 text-sm font-semibold text-green-700 bg-green-100 rounded-full">
            Activo
          </span>
        </div>

      </div>
    </div>

  </div>
</div>
