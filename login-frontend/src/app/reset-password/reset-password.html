<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <loader *ngIf="isLoading"></loader>
    <div
        class="container max-w-5xl min-h-[80vh] mx-auto border rounded-4xl shadow-md flex flex-col md:flex-row bg-white overflow-hidden">

        <div
            class="w-full md:w-1/2 flex flex-col justify-center items-center gap-4 bg-blue-800 text-white p-10 rounded-r-[150px]">
            <h1 class="text-4xl font-extrabold">Remember?</h1>
            <p>Go back to login if you already have your credentials</p>
            <button
                class="bg-transparent text-white font-bold py-3 px-6 border rounded-lg cursor-pointer hover:bg-blue-700"
                routerLink="/login">
                Sign In
            </button>
        </div>

        <div class="w-full md:w-1/2 flex flex-col justify-center items-center gap-4 p-10">
            <h2 class="text-4xl font-extrabold">Recover Password</h2>

            <!-- Step 1: Email -->
            <form *ngIf="step === 1" [formGroup]="emailForm" (ngSubmit)="sendCode()" class="flex flex-col gap-4 w-full">
                <p class="text-gray-500 text-sm text-center">Enter your email and we'll send you a verification code</p>
                <div class="flex flex-col gap-3">
                    <label for="email">Email:</label>
                    <input type="email" id="email" formControlName="email" class="p-2 border rounded"
                        placeholder="your@email.com">
                    <div *ngIf="emailForm.get('email')?.invalid && emailForm.get('email')?.touched"
                        class="text-red-500 text-sm">
                        Please enter a valid email.
                    </div>
                </div>
                <button type="submit" [disabled]="emailForm.invalid || isLoading"
                    class="bg-blue-600 text-white font-bold p-2 border rounded-lg cursor-pointer hover:bg-blue-700">
                    Send Code
                </button>
            </form>

            <!-- Step 2: OTP -->
            <form *ngIf="step === 2" [formGroup]="otpForm" (ngSubmit)="verifyCode()" class="flex flex-col gap-4 w-full">
                <p class="text-gray-500 text-sm text-center">We sent a 6-digit code to <strong>{{ email }}</strong></p>
                <div class="flex flex-col gap-3">
                    <label for="otp">Verification Code:</label>
                    <input type="text" id="otp" formControlName="code" maxlength="6"
                        class="p-2 border rounded tracking-widest text-center text-xl" placeholder="······">
                    <div *ngIf="otpForm.get('code')?.invalid && otpForm.get('code')?.touched"
                        class="text-red-500 text-sm">
                        Please enter the 6-digit code.
                    </div>
                </div>
                <button type="submit" [disabled]="otpForm.invalid || isLoading"
                    class="bg-blue-600 text-white font-bold p-2 border rounded-lg cursor-pointer hover:bg-blue-700">
                    Verify Code
                </button>
                <button type="button" (click)="step = 1" class="text-blue-600 hover:underline text-sm text-center">
                    Resend Code
                </button>
            </form>

        </div>
    </div>
</div>
